<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotebookLM Assistant</title>
    <style>
      body { margin: 0; padding: 12px; width: 260px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      h1 { margin: 0 0 10px; font-size: 14px; }
      .actions { display: grid; gap: 8px; }
      button { border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
      #open-quick { background: #1f4c3f; color: #fff; }
      #open-manager { background: #2f3f56; color: #fff; }
      #open-options { background: #f0f0f0; }
      #status { margin-top: 8px; font-size: 12px; }
      #status.error { color: #b91c1c; }
      #status.ok { color: #0f5132; }
    </style>
  </head>
  <body>
    <h1>NotebookLM Assistant</h1>
    <div class="actions">
      <button id="open-quick">クイック追加を開く</button>
      <button id="open-manager">整理/統合を開く</button>
      <button id="open-options">設定</button>
    </div>
    <div id="status" class="ok"></div>
    <script src="../dist/popup/index.js"></script>
  </body>
</html>
