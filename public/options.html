<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotebookLM Assistant Options</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 20px; max-width: 820px; }
      h1 { font-size: 20px; margin: 0 0 12px; }
      .row { display: grid; gap: 6px; margin-bottom: 12px; }
      input[type="text"], textarea { width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; padding: 8px; font-size: 13px; }
      textarea { min-height: 180px; }
      .actions { display: flex; gap: 8px; }
      button { border: 0; border-radius: 8px; padding: 10px 12px; cursor: pointer; }
      #save { background: #1f4c3f; color: #fff; }
      #reset { background: #f0f0f0; }
      #status { margin-top: 10px; font-size: 13px; }
      #status.error { color: #b91c1c; }
      #status.ok { color: #0f5132; }
    </style>
  </head>
  <body>
    <h1>NotebookLM Assistant 設定</h1>

    <div class="row">
      <label for="shortcutDescription">ショートカット説明</label>
      <input id="shortcutDescription" type="text" />
    </div>

    <div class="row">
      <label for="backupPathPrefix">バックアップ保存先プレフィックス（Downloads配下）</label>
      <input id="backupPathPrefix" type="text" placeholder="NotebookLMBackups/" />
    </div>

    <div class="row">
      <label for="structuredMergeTemplate">構造化マージのテンプレート</label>
      <textarea id="structuredMergeTemplate"></textarea>
      <small>利用可能プレースホルダ: {{title}}, {{summary}}, {{sourceList}}, {{body}}, {{notes}}</small>
    </div>

    <div class="row">
      <label>
        <input id="enableDevLogs" type="checkbox" /> 開発ログを有効化
      </label>
    </div>

    <div class="actions">
      <button id="save">保存</button>
      <button id="reset">初期値を反映</button>
    </div>
    <div id="status" class="ok">待機中</div>

    <script src="../dist/options/index.js"></script>
  </body>
</html>
